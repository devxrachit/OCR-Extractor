services:
  - type: web
    name: ocr-extractor-api
    runtime: docker
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        sync: false

  - type: worker
    name: ocr-extractor-worker
    runtime: docker
    startCommand: celery -A app.celery_app.celery_app worker --loglevel=info
    envVars:
      - key: REDIS_URL
        sync: false
      - key: C_FORCE_ROOT
        value: "1"
